# The workflow name - appears in the Actions tab
name: Pulse - Daily Summary Bot

on:
  # Scheduled run at 2:30 AM UTC -> 8:00 AM IST
  schedule:
    - cron: '30 2 * * *'

  # Manual trigger adds a "Run workflow" button for testing
  workflow_dispatch:
jobs:
  run_pulse:                  # Job name (your choice)
    runs-on: ubuntu-latest    # GitHub's free Linux server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pulse bot
        run: python bot.py

      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: daily_summary.txt
